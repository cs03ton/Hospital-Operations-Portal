services:
  postgres:
    image: postgres:16
    container_name: hop-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - hop_prod_postgres_data:/var/lib/postgresql/data
      - ./database/backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    container_name: hop-prod-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=${DB_HOST:-postgres};Port=${DB_PORT:-5432};Database=${POSTGRES_DB:?POSTGRES_DB is required};Username=${POSTGRES_USER:?POSTGRES_USER is required};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      Database__SeedOnStartup: ${Database__SeedOnStartup:-false}
      Seed__CreateDefaultAdmin: ${Seed__CreateDefaultAdmin:-false}
      Seed__AdminUsername: ${Seed__AdminUsername:-}
      Seed__AdminPassword: ${Seed__AdminPassword:-}
      Seed__AdminFullName: ${Seed__AdminFullName:-}
      Seed__AdminEmployeeCode: ${Seed__AdminEmployeeCode:-}
      Jwt__Key: ${Jwt__Key:?Jwt__Key is required}
      Jwt__Issuer: ${Jwt__Issuer:-Hop.Api}
      Jwt__Audience: ${Jwt__Audience:-Hop.Client}
      Hospital__Name: ${Hospital__Name:?Hospital__Name is required}
      Storage__RootPath: /app/storage
      LeaveAttachments__MaxFileSizeMb: ${LeaveAttachments__MaxFileSizeMb:-5}
      LeaveAttachments__AllowedExtensions: ${LeaveAttachments__AllowedExtensions:-.pdf,.jpg,.jpeg,.png}
      FileScan__Enabled: ${FileScan__Enabled:-true}
      FileScan__Provider: ${FileScan__Provider:-ClamAV}
      FileScan__FailClosed: ${FileScan__FailClosed:-true}
      ClamAv__Host: clamav
      ClamAv__Port: 3310
      ClamAv__TimeoutMs: ${ClamAv__TimeoutMs:-5000}
      Line__Enabled: ${Line__Enabled:-false}
      Line__ChannelSecret: ${Line__ChannelSecret:-}
      Line__ChannelAccessToken: ${Line__ChannelAccessToken:-}
      LineRetry__Enabled: ${LineRetry__Enabled:-false}
      ApprovalEscalation__Enabled: ${ApprovalEscalation__Enabled:-false}
      RefreshToken__ReuseDetectionEnabled: ${RefreshToken__ReuseDetectionEnabled:-true}
      Auth__TokenStorageMode: ${Auth__TokenStorageMode:-Cookie}
      Auth__Cookie__Secure: ${Auth__Cookie__Secure:-true}
      Auth__Cookie__SameSite: ${Auth__Cookie__SameSite:-Lax}
      Auth__Cookie__Domain: ${Auth__Cookie__Domain:-}
      Auth__Cookie__RefreshTokenName: ${Auth__Cookie__RefreshTokenName:-hop_refresh_token}
      Auth__Cookie__CsrfEnabled: ${Auth__Cookie__CsrfEnabled:-true}
      Auth__Cookie__CsrfTokenName: ${Auth__Cookie__CsrfTokenName:-hop_csrf_token}
      Auth__Cookie__CsrfHeaderName: ${Auth__Cookie__CsrfHeaderName:-X-CSRF-TOKEN}
      Cors__AllowCredentials: ${Cors__AllowCredentials:-true}
      Cors__AllowedOrigins__0: ${PUBLIC_APP_URL:?PUBLIC_APP_URL is required}
      LoginRateLimit__Enabled: ${LoginRateLimit__Enabled:-true}
      AuditLog__RetentionDays: ${AuditLog__RetentionDays:-365}
    depends_on:
      postgres:
        condition: service_healthy
      clamav:
        condition: service_healthy
    volumes:
      - hop_prod_storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  clamav:
    image: clamav/clamav:1.4
    container_name: hop-prod-clamav
    restart: unless-stopped
    volumes:
      - hop_prod_clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --version >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: deploy/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_APP_NAME: ${VITE_APP_NAME:-Hospital Operations Portal}
        VITE_HOSPITAL_NAME: ${VITE_HOSPITAL_NAME:?VITE_HOSPITAL_NAME is required}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-1.0.0}
        VITE_AUTH_TOKEN_STORAGE_MODE: ${VITE_AUTH_TOKEN_STORAGE_MODE:-cookie}
        VITE_AUTH_CSRF_COOKIE_NAME: ${VITE_AUTH_CSRF_COOKIE_NAME:-hop_csrf_token}
        VITE_AUTH_CSRF_HEADER_NAME: ${VITE_AUTH_CSRF_HEADER_NAME:-X-CSRF-TOKEN}
    container_name: hop-prod-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: hop-prod-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  hop_prod_postgres_data:
  hop_prod_storage:
  hop_prod_clamav_data:
