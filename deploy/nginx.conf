events {}

http {
    upstream hop_frontend {
        server frontend:80;
    }

    upstream hop_backend {
        server backend:8080;
    }

    map $http_x_forwarded_proto $strict_transport_security {
        default "";
        https "max-age=31536000; includeSubDomains";
    }

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/xml
        font/opentype
        image/svg+xml
        text/css
        text/plain
        text/xml;

    server {
        listen 80;
        server_name _;
        client_max_body_size 20m;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security $strict_transport_security always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: blob: https:; font-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.line.me;" always;

        location /api/ {
            proxy_pass http://hop_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $http_x_correlation_id;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location = /healthz {
            proxy_pass http://hop_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Correlation-ID $http_x_correlation_id;
        }

        location = /health {
            proxy_pass http://hop_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Correlation-ID $http_x_correlation_id;
        }

        location = /health/live {
            proxy_pass http://hop_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Correlation-ID $http_x_correlation_id;
        }

        location = /health/ready {
            proxy_pass http://hop_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Correlation-ID $http_x_correlation_id;
        }

        location / {
            proxy_pass http://hop_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        location @spa_fallback {
            proxy_pass http://hop_frontend/index.html;
            proxy_set_header Host $host;
        }
    }
}
