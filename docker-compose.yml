services:
  postgres:
    image: postgres:16
    container_name: hop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - hop_postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hop_user} -d ${POSTGRES_DB:-hop_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    container_name: hop-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:?POSTGRES_DB is required};Username=${POSTGRES_USER:?POSTGRES_USER is required};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      Jwt__Key: ${JWT_SECRET:?JWT_SECRET is required}
      Jwt__Issuer: ${Jwt__Issuer:-Hop.Api}
      Jwt__Audience: ${Jwt__Audience:-Hop.Client}
      Line__ChannelSecret: ${LINE_CHANNEL_SECRET:-}
      Line__ChannelAccessToken: ${LINE_ACCESS_TOKEN:-}
      Storage__RootPath: ${STORAGE_ROOT_PATH:-/app/storage}
      LeaveAttachments__MaxFileSizeMb: ${LEAVE_ATTACHMENT_MAX_FILE_SIZE_MB:-5}
      LeaveAttachments__AllowedExtensions: ${LEAVE_ATTACHMENT_ALLOWED_EXTENSIONS:-.pdf,.jpg,.jpeg,.png}
      RefreshToken__ReuseDetectionEnabled: ${REFRESH_TOKEN_REUSE_DETECTION_ENABLED:-true}
      AuditLog__RetentionDays: ${AUDIT_LOG_RETENTION_DAYS:-365}
      Cors__AllowedOrigins__0: http://localhost:5173
      Cors__AllowedOrigins__1: http://127.0.0.1:5173
      Cors__AllowedOrigins__2: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-5000}:8080"
    volumes:
      - hop_storage:/app/storage

  frontend:
    build:
      context: .
      dockerfile: deploy/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
        VITE_APP_NAME: ${VITE_APP_NAME:-Hospital Operations Portal}
        VITE_HOSPITAL_NAME: ${VITE_HOSPITAL_NAME:-โรงพยาบาลนาหมื่น}
    container_name: hop-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
      VITE_MAX_UPLOAD_SIZE_MB: ${VITE_MAX_UPLOAD_SIZE_MB:-5}
      VITE_APP_NAME: ${VITE_APP_NAME:-Hospital Operations Portal}
      VITE_HOSPITAL_NAME: ${VITE_HOSPITAL_NAME:-โรงพยาบาลนาหมื่น}
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: hop-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  hop_postgres_data:
  hop_storage:
